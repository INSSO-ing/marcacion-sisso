<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSSO - Registro de Asistencia</title>
    <!-- Tailwind CSS (Tema Claro Avanzado) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Leaflet CSS para el Mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Inter', sans-serif; }
        #map { height: 160px; width: 100%; border-radius: 14px; }
        
        /* Patrón Geométrico de Ingeniería para Fondo de Pantalla Completa */
        .bg-flayer-ingenieria {
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(20, 184, 166, 0.06) 0px, transparent 50%),
                radial-gradient(at 50% 0%, rgba(14, 165, 233, 0.04) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(241, 245, 249, 0.8) 0px, transparent 70%),
                linear-gradient(90deg, rgba(203, 213, 225, 0.15) 1px, transparent 1px),
                linear-gradient(180deg, rgba(203, 213, 225, 0.15) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 100% 100%, 30px 30px, 30px 30px;
        }
    </style>
</head>
<body class="bg-flayer-ingenieria min-h-screen flex flex-col items-center justify-between p-4 selection:bg-teal-500 selection:text-white relative overflow-x-hidden">

    <!-- MARCA CENTRAL EN TODA LA PANTALLA (TEXTO EN EL FLAYER DE FONDO) -->
    <div class="absolute inset-0 flex flex-col items-center justify-start pt-12 pointer-events-none select-none z-0 px-6 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-slate-800 via-teal-950 to-slate-900 drop-shadow-sm uppercase">
            INSSO
        </h1>
        <div class="h-0.5 w-16 bg-gradient-to-r from-teal-500 to-sky-500 my-2 rounded-full"></div>
        <p class="text-[11px] md:text-xs font-bold tracking-[0.3em] text-slate-400 uppercase">
            Consultoría e Ingeniería
        </p>
    </div>

    <!-- CONTENEDOR PRINCIPAL DE LA APLICACIÓN (CUBRE EL CONTENIDO) -->
    <main class="w-full max-w-md bg-white/90 backdrop-blur-md border border-slate-200/80 shadow-2xl rounded-[28px] p-6 mt-36 mb-auto space-y-5 z-10 transition-all">
        
        <!-- ENCABEZADO INTERNO DE LA APP -->
        <header class="text-center space-y-1">
            <p class="text-[10px] font-bold uppercase tracking-[0.15em] text-teal-600 bg-teal-50 border border-teal-100 px-3 py-1 rounded-full inline-block mx-auto">
                Sistema de Marcación Digital
            </p>
        </header>

        <!-- SECCIÓN DE FECHA Y HORA EN TIEMPO REAL -->
        <section class="bg-slate-50 border border-slate-200/60 rounded-2xl p-4 text-center shadow-inner">
            <div id="live-date" class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-0.5">Cargando fecha...</div>
            <div id="live-time" class="text-3xl font-bold text-slate-900 font-mono tracking-tight">00:00:00</div>
        </section>

        <!-- CAMPO DEL COLABORADOR -->
        <section class="space-y-1.5">
            <label for="input-empleado" class="text-xs font-bold uppercase tracking-wider text-slate-400 pl-1">Nombre del Colaborador</label>
            <input type="text" id="input-empleado" placeholder="Ej. Juan Pérez" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 font-medium placeholder:text-slate-400 focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-100 transition-all text-sm shadow-sm">
        </section>

        <!-- SECCIÓN DEL MAPA (TEMA CLARO) -->
        <section class="space-y-1.5">
            <div class="flex justify-between items-center pl-1">
                <label class="text-xs font-bold uppercase tracking-wider text-slate-400">Ubicación GPS Actual</label>
                <span id="geo-status" class="text-[10px] font-bold text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full border border-amber-200 flex items-center gap-1">
                    <span class="h-1.5 w-1.5 rounded-full bg-amber-500 animate-pulse"></span> Buscando señal...
                </span>
            </div>
            <div id="map" class="border border-slate-200 shadow-sm bg-slate-100"></div>
        </section>

        <!-- BOTONES DE ACCIÓN (ENTRADA / SALIDA) -->
        <footer class="grid grid-cols-2 gap-4 pt-1">
            <button id="btn-entrada" disabled class="disabled:opacity-40 bg-emerald-600 hover:bg-emerald-700 active:scale-95 text-white font-bold py-3.5 rounded-xl transition-all shadow-md shadow-emerald-100 flex flex-col items-center justify-center gap-0.5 text-sm">
                <span class="text-base">🛫</span> Registrar Entrada
            </button>
            <button id="btn-salida" disabled class="disabled:opacity-40 bg-rose-600 hover:bg-rose-700 active:scale-95 text-white font-bold py-3.5 rounded-xl transition-all shadow-md shadow-rose-100 flex flex-col items-center justify-center gap-0.5 text-sm">
                <span class="text-base">🛬</span> Registrar Salida
            </button>
        </footer>

    </main>

    <!-- PIE DE PÁGINA SIMPLE -->
    <footer class="text-[10px] font-semibold text-slate-400 tracking-wider text-center pt-6 z-10 uppercase">
        &copy; 2026 INSSO Consultoría e Ingeniería.
    </footer>

    <!-- Leaflet JS para el mapa -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- LÓGICA DE FIREBASE Y GPS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // Configuración de tu base de datos
        const firebaseConfig = {
            databaseURL: "https://marcacion-insso-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Elementos de la interfaz
        const liveTime = document.getElementById('live-time');
        const liveDate = document.getElementById('live-date');
        const inputEmpleado = document.getElementById('input-empleado');
        const geoStatus = document.getElementById('geo-status');
        const btnEntrada = document.getElementById('btn-entrada');
        const btnSalida = document.getElementById('btn-salida');

        let coordenadasActuales = null;
        let map = null;
        let marker = null;

        // RELOJ EN TIEMPO REAL (FECHA Y HORA ACTUALES)
        function actualizarReloj() {
            const ahora = new Date();
            liveTime.innerText = ahora.toLocaleTimeString('es-ES', { hour12: false });
            liveDate.innerText = ahora.toLocaleDateString('es-ES', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        // INICIALIZACIÓN DEL MAPA CLARO (Estilo estándar de OpenStreetMap)
        function inicializarMapa(lat, lon) {
            if (!map) {
                map = L.map('map', { zoomControl: false }).setView([lat, lon], 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap'
                }).addTo(map);
                marker = L.marker([lat, lon]).addTo(map);
            } else {
                map.setView([lat, lon], 16);
                marker.setLatLng([lat, lon]);
            }
        }

        // GEOLOCALIZACIÓN GPS ACTIVA
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                coordenadasActuales = `${lat},${lon}`;

                geoStatus.innerHTML = `<span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span> GPS Activo`;
                geoStatus.className = "text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full border border-emerald-200 flex items-center gap-1";
                
                btnEntrada.disabled = false;
                btnSalida.disabled = false;

                inicializarMapa(lat, lon);
            }, (error) => {
                console.error(error);
                geoStatus.innerHTML = `⚠️ Error de GPS`;
                geoStatus.className = "text-[10px] font-bold text-rose-600 bg-rose-50 px-2 py-0.5 rounded-full border border-rose-200 flex items-center gap-1";
            }, {
                enableHighAccuracy: true,
                maximumAge: 0
            });
        } else {
            geoStatus.innerText = "❌ GPS no soportado";
        }

        // FUNCIÓN ENVIAR MARCACIÓN A FIREBASE
        function registrarMarcacion(tipo) {
            const nombre = inputEmpleado.value.trim();
            if (!nombre) {
                alert("Por favor, ingrese su nombre antes de marcar.");
                return;
            }

            const ahora = new Date();
            const fechaString = ahora.toLocaleDateString('es-ES', { year: 'numeric', month: '2-digit', day: '2-digit' });
            const horaString = ahora.toLocaleTimeString('es-ES', { hour12: false });

            const nuevaMarca = {
                empleado: nombre,
                empresa: "INSSO CONSULTORIA E INGENIERIA",
                tipo: tipo,
                coordenadas: coordenadasActuales,
                fecha: fechaString,
                hora: horaString,
                timestamp: serverTimestamp()
            };

            const nodoRef = ref(db, '/marcaciones_sisso');
            push(nodoRef, nuevaMarca)
                .then(() => {
                    alert(`¡${tipo} registrada con éxito!\nFecha: ${fechaString}\nHora: ${horaString}`);
                    inputEmpleado.value = "";
                })
                .catch((err) => {
                    alert("Error al guardar en base de datos: " + err.message);
                });
        }

        btnEntrada.addEventListener('click', () => registrarMarcacion("ENTRADA"));
        btnSalida.addEventListener('click', () => registrarMarcacion("SALIDA"));
    </script>
</body>
</html>
