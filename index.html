<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISSO INGENIERÍA - Control de Asistencia</title>
    <!-- Tailwind CSS para Diseño Móvil Premium -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .scan-line {
            animation: scan 2.5s linear infinite;
        }
        @keyframes scan {
            0%, 100% { top: 0%; opacity: 0.3; }
            50% { top: 100%; opacity: 0.8; }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between p-4 selection:bg-teal-500 selection:text-slate-900">

    <!-- Encabezado Principal de SISSO -->
    <header class="w-full max-w-md mx-auto text-center mt-4">
        <div class="inline-flex items-center gap-2 bg-slate-800 border border-slate-700 px-4 py-1.5 rounded-full mb-3 shadow-inner">
            <span class="flex h-2 w-2 relative">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-teal-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-teal-500"></span>
            </span>
            <span class="text-xs font-semibold uppercase tracking-wider text-teal-400">Terminal Biométrica v2.0</span>
        </div>
        <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">
            SISSO INGENIERÍA
        </h1>
        <p class="text-xs font-medium text-slate-400 tracking-wide uppercase mt-0.5">
            Consultoría en Seguridad Industrial
        </p>
    </header>

    <!-- Contenedor de la Aplicación Móvil -->
    <main class="w-full max-w-md mx-auto bg-slate-800/80 backdrop-blur-md border border-slate-700/60 rounded-3xl p-6 shadow-2xl my-6 relative overflow-hidden">
        
        <!-- Selección de Personal -->
        <div class="mb-5">
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Colaborador Industrial:</label>
            <div class="relative">
                <select id="empleado-select" class="w-full bg-slate-950/80 border border-slate-700 rounded-xl px-4 py-3.5 text-slate-200 font-medium focus:outline-none focus:border-teal-500 appearance-none cursor-pointer transition-all">
                    <option value="Ayudante Técnico 1">Ayudante Técnico 1</option>
                    <option value="Personal de Apoyo 2">Personal de Apoyo 2</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                    <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                </div>
            </div>
        </div>

        <!-- Visor de Reconocimiento Facial (Simulado) -->
        <div class="relative w-full aspect-square bg-slate-950 border border-slate-700/80 rounded-2xl flex flex-col items-center justify-center p-4 overflow-hidden shadow-inner mb-5">
            
            <!-- Línea de escaneo láser interactiva -->
            <div id="laser-line" class="absolute left-0 w-full h-0.5 bg-gradient-to-r from-transparent via-teal-400 to-transparent shadow-[0_0_8px_#2dd4bf] z-10 hidden scan-line"></div>
            
            <!-- Retícula de Face ID SVG -->
            <div id="face-icon" class="w-32 h-32 text-slate-600 transition-all duration-700 relative">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor" class="w-full h-full">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.182 15.182a4.5 4.5 0 0 1-6.364 0M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0ZM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75 9.168 9 9.375 9s.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Zm5.625 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Z" />
                </svg>
            </div>

            <!-- Estado en tiempo real del GPS -->
            <div id="camera-overlay" class="absolute bottom-4 inset-x-4 bg-slate-900/90 border border-slate-800 text-center py-2 rounded-xl backdrop-blur-sm">
                <span id="gps-status" class="text-xs font-semibold text-amber-500 tracking-wide flex items-center justify-center gap-1.5">
                    <svg class="animate-spin h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    Sincronizando coordenadas GPS...
                </span>
            </div>
        </div>

        <!-- Botones de Acción (Entrada / Salida) -->
        <div class="grid grid-cols-2 gap-4">
            <button id="btn-entrada" class="active:scale-[0.98] transition-all bg-gradient-to-br from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 disabled:opacity-40 text-slate-950 font-bold py-4 px-4 rounded-xl flex flex-col items-center justify-center gap-1 shadow-lg shadow-emerald-950/20">
                <span class="text-sm uppercase tracking-wider">Entrada</span>
                <span class="text-[10px] font-normal opacity-80">Iniciar Turno</span>
            </button>
            <button id="btn-salida" class="active:scale-[0.98] transition-all bg-gradient-to-br from-rose-500 to-red-600 hover:from-rose-600 hover:to-red-700 disabled:opacity-40 text-white font-bold py-4 px-4 rounded-xl flex flex-col items-center justify-center gap-1 shadow-lg shadow-rose-950/20">
                <span class="text-sm uppercase tracking-wider">Salida</span>
                <span class="text-[10px] font-normal opacity-80">Finalizar</span>
            </button>
        </div>

        <!-- Mensaje de estado -->
        <div id="status-message" class="text-xs font-medium text-center text-slate-400 min-h-[20px] mt-4"></div>
    </main>

    <!-- Pie de página -->
    <footer class="w-full text-center pb-2">
        <p class="text-[10px] text-slate-500 tracking-wider uppercase">© 2026 SISSO INGENIERÍA • Control de Seguridad e Higiene</p>
    </footer>

    <!-- LÓGICA INTEGRADA CON REALTIME DATABASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // Configuración oficial de tu proyecto Marcacion INSSO
        const firebaseConfig = {
            apiKey: "AIzaSyB9OPdG6MHHcs6NbIg9bBBDnmTJyquG9wg",
            authDomain: "marcacion-insso.firebaseapp.com",
            databaseURL: "https://marcacion-insso-default-rtdb.firebaseio.com/",
            projectId: "marcacion-insso",
            storageBucket: "marcacion-insso.firebasestorage.app",
            messagingSenderId: "116053257095",
            appId: "1:116053257095:web:647eb8bc92e6bdde010122",
            measurementId: "G-5XSG9VZRS4"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentCoords = null;

        const bEntrada = document.getElementById('btn-entrada');
        const bSalida = document.getElementById('btn-salida');
        bEntrada.disabled = true;
        bSalida.disabled = true;

        // Captura obligatoria de Geolocalización (Se activa en HTTPS / GitHub Pages)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                currentCoords = `${position.coords.latitude}, ${position.coords.longitude}`;
                document.getElementById('gps-status').innerHTML = `
                    <svg class="h-4 w-4 text-teal-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    Ubicación Asegurada (GPS Activo)
                `;
                document.getElementById('gps-status').className = "text-xs font-semibold text-teal-400 tracking-wide flex items-center justify-center gap-1.5";
                bEntrada.disabled = false;
                bSalida.disabled = false;
            }, (error) => {
                // Soporte para pruebas en entorno local simulando coordenadas fijas
                if (window.location.protocol === 'file:') {
                    currentCoords = "-25.2865, -57.6145"; 
                    document.getElementById('gps-status').innerHTML = `
                        <svg class="h-4 w-4 text-teal-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        Modo Local (GPS Simulado)
                    `;
                    document.getElementById('gps-status').className = "text-xs font-semibold text-teal-400 tracking-wide flex items-center justify-center gap-1.5";
                    bEntrada.disabled = false;
                    bSalida.disabled = false;
                } else {
                    document.getElementById('gps-status').innerHTML = "❌ GPS Desactivado (Habilite ubicación)";
                    document.getElementById('gps-status').className = "text-xs font-semibold text-rose-500 tracking-wide flex items-center justify-center gap-1.5";
                }
            }, { enableHighAccuracy: true });
        }

        // Animación Face ID y guardado en Realtime Database
        async function ejecutarBiometriaYGuardar(tipo) {
            const empleado = document.getElementById('empleado-select').value;
            const statusMessage = document.getElementById('status-message');
            const laser = document.getElementById('laser-line');
            const faceIcon = document.getElementById('face-icon');

            bEntrada.disabled = true;
            bSalida.disabled = true;
            laser.classList.remove('hidden');
            faceIcon.classList.remove('text-slate-600');
            faceIcon.classList.add('text-teal-400', 'animate-pulse');
            statusMessage.innerText = "Analizando rasgos faciales (Face ID)...";

            setTimeout(async () => {
                try {
                    const ahora = new Date();
                    // Configurado con el huso horario estricto de Paraguay
                    const fechaLocal = ahora.toLocaleDateString('es-PY', { timeZone: 'America/Asuncion' });
                    const horaLocal = machinedTime(ahora);

                    // Estructura en árbol JSON clásico de Realtime Database
                    const listaMarcacionesRef = ref(db, 'marcaciones_sisso');
                    const nuevaMarcacionRef = push(listaMarcacionesRef);

                    await set(nuevaMarcacionRef, {
                        empleado: empleado,
                        fecha: fechaLocal,
                        hora: horaLocal,
                        tipo: tipo,
                        coordenadas: currentCoords,
                        verificacion: "FACEID_OK",
                        empresa: "SISSO INGENIERIA",
                        timestamp: ahora.getTime()
                    });

                    statusMessage.innerHTML = `<span class="text-teal-400 font-bold">✓ Marcación registrada con éxito a las ${horaLocal}</span>`;
                } catch (err) {
                    statusMessage.innerHTML = `<span class="text-rose-400 font-bold">Error de sincronización: ${err.message}</span>`;
                } finally {
                    laser.classList.add('hidden');
                    faceIcon.classList.remove('animate-pulse');
                    bEntrada.disabled = false;
                    bSalida.disabled = false;
                }
            }, 2200);
        }

        function machinedTime(date) {
            return date.toLocaleTimeString('es-PY', { timeZone: 'America/Asuncion', hour12: false });
        }

        bEntrada.addEventListener('click', () => ejecutarBiometriaYGuardar('ENTRADA'));
        bSalida.addEventListener('click', () => ejecutarBiometriaYGuardar('SALIDA'));
    </script>
</body>
</html>
