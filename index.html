<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSSO - Registro de Asistencia</title>
    <!-- Tailwind CSS (Tema Claro Avanzado) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Leaflet CSS para el Mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Inter', sans-serif; }
        #map { height: 160px; width: 100%; border-radius: 14px; }
        
        /* Ajuste definitivo para que el Logo ocupe TODA la pantalla como Flyer de Fondo */
        .bg-flayer-pantalla-completa {
            background-color: #ffffff;
            background-image: url('logo-insso.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover; /* Hace que el logo cubra toda la pantalla de forma fluida */
            background-attachment: fixed; /* Evita que el fondo se mueva al hacer scroll */
        }
    </style>
</head>
<body class="bg-flayer-pantalla-completa min-h-screen flex flex-col items-center justify-between p-4 selection:bg-teal-500 selection:text-white relative overflow-x-hidden">

    <!-- CONTENEDOR PRINCIPAL TOTALMENTE TRANSPARENTE -->
    <main class="w-full max-w-md bg-transparent space-y-5 z-10 transition-all mt-4 mb-auto">
        
        <!-- ENCABEZADO INTERNO DE LA APP -->
        <header class="text-center space-y-1">
            <p class="text-[11px] font-extrabold uppercase tracking-[0.15em] text-slate-900 bg-white/80 border border-slate-300 px-4 py-1.5 rounded-full inline-block mx-auto backdrop-blur-sm shadow-sm">
                Sistema de Marcación Digital
            </p>
        </header>

        <!-- SECCIÓN DE FECHA Y HORA EN TIEMPO REAL -->
        <section class="bg-white/85 backdrop-blur-md border border-slate-300/80 rounded-2xl p-4 text-center shadow-md relative">
            <div id="live-date" class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-0.5">Sincronizando reloj...</div>
            <div id="live-time" class="text-3xl font-extrabold text-slate-900 font-mono tracking-tight">00:00:00</div>
            <!-- Indicador visual de red -->
            <div id="net-status" class="absolute top-2 right-2 text-[9px] font-bold px-2 py-0.5 rounded-full border bg-emerald-50 text-emerald-600 border-emerald-200">CONECTADO</div>
        </section>

        <!-- CUADRÍCULA DE VERIFICACIÓN (DINÁMICA PARA ENTRADA Y SALIDA) -->
        <section id="alerta-verificacion" class="hidden transform scale-95 transition-all duration-300">
            <div id="contenedor-mensaje" class="bg-emerald-500/90 border-2 border-emerald-600 text-white rounded-2xl p-4 flex flex-col items-center justify-center text-center space-y-2 shadow-lg backdrop-blur-md">
                <div id="icono-mensaje" class="w-10 h-10 bg-white text-emerald-600 rounded-full flex items-center justify-center shadow-md">
                    <svg class="h-6 w-6 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <div>
                    <h3 id="titulo-verificacion" class="font-black text-sm tracking-wide uppercase"></h3>
                    <p id="detalles-verificacion" class="text-xs font-semibold mt-0.5 opacity-90"></p>
                    <p id="subtitulo-verificacion" class="text-[10px] font-bold tracking-wide mt-1 uppercase opacity-80"></p>
                </div>
            </div>
        </section>

        <!-- CAMPO DEL COLABORADOR -->
        <section class="space-y-1.5">
            <label for="input-empleado" class="text-xs font-extrabold uppercase tracking-wider text-slate-900 bg-white/60 px-2 py-0.5 rounded backdrop-blur-xs inline-block">Nombre del Colaborador</label>
            <input type="text" id="input-empleado" placeholder="Ej. Juan Pérez" class="w-full bg-white/90 border border-slate-300 rounded-xl px-4 py-3 text-slate-900 font-bold placeholder:text-slate-400 focus:outline-none focus:border-slate-600 focus:ring-2 focus:ring-slate-200 transition-all text-sm shadow-md">
        </section>

        <!-- SECCIÓN DEL MAPA -->
        <section class="space-y-1.5">
            <div class="flex justify-between items-center px-1">
                <label class="text-xs font-extrabold uppercase tracking-wider text-slate-900 bg-white/60 px-2 py-0.5 rounded backdrop-blur-xs inline-block">Ubicación GPS Actual</label>
                <span id="geo-status" class="text-[10px] font-bold text-amber-900 bg-white/80 px-2 py-0.5 rounded-full border border-amber-300 flex items-center gap-1 shadow-sm backdrop-blur-xs">
                    <span class="h-1.5 w-1.5 rounded-full bg-amber-500 animate-pulse"></span> Buscando señal...
                </span>
            </div>
            <div id="map" class="border border-slate-300 shadow-md bg-white/50 backdrop-blur-xs"></div>
        </section>

        <!-- BOTONES DE ACCIÓN (ENTRADA / SALIDA) -->
        <footer class="grid grid-cols-2 gap-4 pt-1">
            <button id="btn-entrada" disabled class="disabled:opacity-40 bg-emerald-600 hover:bg-emerald-700 active:scale-95 text-white font-black py-3.5 rounded-xl transition-all shadow-lg shadow-emerald-900/20 flex flex-col items-center justify-center gap-0.5 text-sm uppercase tracking-wider">
                <span class="text-base">🛫</span> Registrar Entrada
            </button>
            <button id="btn-salida" disabled class="disabled:opacity-40 bg-rose-600 hover:bg-rose-700 active:scale-95 text-white font-black py-3.5 rounded-xl transition-all shadow-lg shadow-rose-900/20 flex flex-col items-center justify-center gap-0.5 text-sm uppercase tracking-wider">
                <span class="text-base">🛬</span> Registrar Salida
            </button>
        </footer>

    </main>

    <!-- PIE DE PÁGINA SIMPLE EN ALTO CONTRASTE -->
    <footer class="text-[10px] font-extrabold text-slate-900 bg-white/70 px-4 py-1 rounded-full border border-slate-200 shadow-sm backdrop-blur-xs tracking-wider text-center mt-6 z-10 uppercase">
        &copy; 2026 INSSO Consultoría en Seguridad y Salud Ocupacional.
    </footer>

    <!-- Leaflet JS para el mapa -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- LÓGICA DE FIREBASE, GPS Y OFFLINE COOPERATIVO -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, push, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://marcacion-insso-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const liveTime = document.getElementById('live-time');
        const liveDate = document.getElementById('live-date');
        const inputEmpleado = document.getElementById('input-empleado');
        const geoStatus = document.getElementById('geo-status');
        const netStatus = document.getElementById('net-status');
        const btnEntrada = document.getElementById('btn-entrada');
        const btnSalida = document.getElementById('btn-salida');
        
        const alertaVerificacion = document.getElementById('alerta-verificacion');
        const tituloVerificacion = document.getElementById('titulo-verificacion');
        const detallesVerificacion = document.getElementById('detalles-verificacion');
        const subtituloVerificacion = document.getElementById('subtitulo-verificacion');
        const contenedorMensaje = document.getElementById('contenedor-mensaje');
        const iconoMensaje = document.getElementById('icono-mensaje');

        let coordenadasActuales = null;
        let map = null;
        let marker = null;
        let desfaseServidorMs = 0;
        let estaOnline = navigator.onLine;

        const OPCIONES_ZONA_HORARIA = { timeZone: 'America/Asuncion' };

        // MONITOREO DE RED EN TIEMPO REAL
        function actualizarEstadoRed() {
            estaOnline = navigator.onLine;
            if (estaOnline) {
                netStatus.innerText = "CONECTADO";
                netStatus.className = "absolute top-2 right-2 text-[9px] font-bold px-2 py-0.5 rounded-full border bg-emerald-50 text-emerald-600 border-emerald-200";
                subirMarcacionesLocalesAatrasadas();
            } else {
                netStatus.innerText = "SIN INTERNET (MODO LOCAL)";
                netStatus.className = "absolute top-2 right-2 text-[9px] font-bold px-2 py-0.5 rounded-full border bg-amber-50 text-amber-600 border-amber-200 animate-pulse";
            }
        }
        window.addEventListener('online', actualizarEstadoRed);
        window.addEventListener('offline', actualizarEstadoRed);
        actualizarEstadoRed();

        // RECONOCER EL DESFASE DE HORA CON EL SERVIDOR
        if (estaOnline) {
            get(ref(db, ".info/serverTimeOffset")).then((snapshot) => {
                desfaseServidorMs = snapshot.val() || 0;
            }).catch(() => {});
        }

        // RELOJ EN TIEMPO REAL
        function actualizarReloj() {
            const horaVerdaderaInteligente = new Date(Date.now() + desfaseServidorMs);
            liveTime.innerText = horaVerdaderaInteligente.toLocaleTimeString('es-ES', { ...OPCIONES_ZONA_HORARIA, hour12: false });
            liveDate.innerText = horaVerdaderaInteligente.toLocaleDateString('es-ES', { 
                ...OPCIONES_ZONA_HORARIA, weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        // INICIALIZACIÓN DEL MAPA
        function inicializarMapa(lat, lon) {
            if (!map) {
                map = L.map('map', { zoomControl: false }).setView([lat, lon], 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
                marker = L.marker([lat, lon]).addTo(map);
            } else {
                map.setView([lat, lon], 16);
                marker.setLatLng([lat, lon]);
            }
        }

        // GEOLOCALIZACIÓN GPS
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                coordenadasActuales = `${lat},${lon}`;
                geoStatus.innerHTML = `<span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span> GPS Activo`;
                geoStatus.className = "text-[10px] font-bold text-emerald-600 bg-white/80 px-2 py-0.5 rounded-full border border-emerald-300 flex items-center gap-1 shadow-sm";
                btnEntrada.disabled = false;
                btnSalida.disabled = false;
                inicializarMapa(lat, lon);
            }, (error) => {
                geoStatus.innerHTML = `⚠️ Error de GPS`;
                geoStatus.className = "text-[10px] font-bold text-rose-600 bg-white/80 px-2 py-0.5 rounded-full border border-rose-300 flex items-center gap-1 shadow-sm";
            }, { enableHighAccuracy: true, maximumAge: 0 });
        }

        // MOSTRAR CONFIRMACIÓN VISUAL EN PANTALLA
        function mostrarAlertaExito(nombre, tipo, hora, esOffline = false) {
            if (tipo === "ENTRADA") {
                tituloVerificacion.innerText = "¡TURNO ABIERTO EXCELENTEMENTE!";
                contenedorMensaje.className = "bg-emerald-600 border-2 border-emerald-700 text-white rounded-2xl p-4 flex flex-col items-center justify-center text-center space-y-2 shadow-xl";
                iconoMensaje.className = "w-10 h-10 bg-white text-emerald-600 rounded-full flex items-center justify-center shadow-md";
            } else {
                tituloVerificacion.innerText = "¡SALIDA REGISTRADA CON ÉXITO!";
                contenedorMensaje.className = "bg-indigo-600 border-2 border-indigo-700 text-white rounded-2xl p-4 flex flex-col items-center justify-center text-center space-y-2 shadow-xl";
                iconoMensaje.className = "w-10 h-10 bg-white text-indigo-600 rounded-full flex items-center justify-center shadow-md";
            }

            detallesVerificacion.innerText = `${nombre} • M.: ${tipo} • ${hora} hs`;
            
            if (esOffline) {
                subtituloVerificacion.innerText = "💾 Guardado localmente (Sin Internet)";
            } else {
                subtituloVerificacion.innerText = "✓ Hora oficial de servidor validada";
            }

            alertaVerificacion.classList.remove('hidden');
            setTimeout(() => alertaVerificacion.classList.remove('scale-95'), 10);
            inputEmpleado.value = "";

            setTimeout(() => {
                alertaVerificacion.classList.add('scale-95');
                setTimeout(() => alertaVerificacion.classList.add('hidden'), 300);
            }, 6000);
        }

        // GESTIÓN DE MARCACIONES
        function registrarMarcacion(tipo) {
            const nombre = inputEmpleado.value.trim();
            if (!nombre) {
                alert("Por favor, ingrese su nombre antes de marcar.");
                return;
            }

            const tiempoServidorExacto = new Date(Date.now() + desfaseServidorMs);
            const fechaString = tiempoServidorExacto.toLocaleDateString('es-ES', { ...OPCIONES_ZONA_HORARIA, year: 'numeric', month: '2-digit', day: '2-digit' });
            const horaString = tiempoServidorExacto.toLocaleTimeString('es-ES', { ...OPCIONES_ZONA_HORARIA, hour12: false });

            const nuevaMarca = {
                empleado: nombre,
                empresa: "INSSO CONSULTORIA EN SEGURIDAD Y SALUD OCUPACIONAL",
                tipo: tipo,
                coordenadas: coordenadasActuales,
                fecha: fechaString,
                hora: horaString,
                timestamp: estaOnline ? serverTimestamp() : Date.now()
            };

            if (estaOnline) {
                push(ref(db, '/marcaciones_sisso'), nuevaMarca)
                    .then(() => mostrarAlertaExito(nombre, tipo, horaString, false))
                    .catch(() => guardarEnLocal(nuevaMarca, horaString));
            } else {
                guardarEnLocal(nuevaMarca, horaString);
            }
        }

        function guardarEnLocal(objetoMarca, horaString) {
            let pendientes = JSON.parse(localStorage.getItem('insso_pendientes')) || [];
            pendientes.push(objetoMarca);
            localStorage.setItem('insso_pendientes', JSON.stringify(pendientes));
            
            mostrarAlertaExito(objetoMarca.empleado, objetoMarca.tipo, horaString, true);
        }

        function subirMarcacionesLocalesAatrasadas() {
            let pendientes = JSON.parse(localStorage.getItem('insso_pendientes')) || [];
            if (pendientes.length === 0) return;
            
            pendientes.forEach((marca) => {
                marca.timestamp = serverTimestamp(); 
                push(ref(db, '/marcaciones_sisso'), marca);
            });

            localStorage.removeItem('insso_pendientes');
        }

        btnEntrada.addEventListener('click', () => registrarMarcacion("ENTRADA"));
        btnSalida.addEventListener('click', () => registrarMarcacion("SALIDA"));
    </script>
</body>
</html>
